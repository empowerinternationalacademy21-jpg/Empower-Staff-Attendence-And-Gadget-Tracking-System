{% extends 'base.html' %}
{% block title %}Edit Staff Member — EIA System{% endblock %}
{% block content %}

<div class="page-header">
  <h1><i class="fas fa-user-edit"></i> Edit Staff Member</h1>
  <a href="{{ url_for('staff_list') }}" class="btn btn-outline">
    <i class="fas fa-arrow-left"></i> Back to Staff
  </a>
</div>

<div class="form-card">
  <div class="staff-edit-banner">
    <div class="edit-avatar">{{ staff['name'][0] }}</div>
    <div>
      <strong>{{ staff['name'] }}</strong>
      <span>{{ staff['department'] or 'No department set' }}</span>
    </div>
  </div>

  <form method="POST" action="{{ url_for('edit_staff', staff_id=staff['id']) }}">

    <div class="form-section-label">Personal Information</div>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name <span class="required-star">*</span></label>
        <div class="input-with-icon">
          <i class="fas fa-user"></i>
          <input type="text" name="name" class="form-control" value="{{ staff['name'] }}" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Department / Subject</label>
        <div class="input-with-icon">
          <i class="fas fa-chalkboard-teacher"></i>
          <input type="text" name="department" class="form-control" value="{{ staff['department'] or '' }}"/>
        </div>
      </div>
    </div>

    <div class="form-section-label">Contact Details</div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone Number <span class="required-star">*</span></label>
        <div class="input-with-icon">
          <i class="fas fa-phone"></i>
          <input type="tel" name="phone" class="form-control" value="{{ staff['phone'] or '' }}" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address <span class="required-star">*</span></label>
        <div class="input-with-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" class="form-control" value="{{ staff['email'] }}" required/>
        </div>
      </div>
    </div>

    <div class="form-divider"></div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-lg">
        <i class="fas fa-save"></i> Save Changes
      </button>
      <a href="{{ url_for('staff_list') }}" class="btn btn-outline btn-lg">Cancel</a>
    </div>
  </form>
</div>

<style>
.staff-edit-banner {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.2rem;
  background: var(--navy-ghost);
  border-radius: var(--radius-sm);
  margin-bottom: 1.5rem;
  border: 1px solid var(--ink-rule);
}
.edit-avatar {
  width: 46px; height: 46px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--navy-light), var(--navy));
  color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 1.2rem; font-weight: 700;
  flex-shrink: 0;
}
.staff-edit-banner div strong { display: block; font-weight: 700; color: var(--navy); }
.staff-edit-banner div span { font-size: .82rem; color: var(--ink-light); }

.form-section-label {
  font-size: .72rem; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--ink-ghost);
  margin: 1.5rem 0 .9rem;
  padding-bottom: .4rem;
  border-bottom: 1px solid var(--ink-rule);
}
.form-section-label:first-of-type { margin-top: 0; }
.required-star { color: var(--danger); font-size: .8rem; margin-left: 2px; }
.input-with-icon { position: relative; }
.input-with-icon i {
  position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
  color: var(--ink-ghost); font-size: .85rem; pointer-events: none;
}
.input-with-icon .form-control { padding-left: 2.4rem; }
.form-divider { height: 1px; background: var(--ink-rule); margin: 1.5rem 0; }
</style>

{% endblock %}
