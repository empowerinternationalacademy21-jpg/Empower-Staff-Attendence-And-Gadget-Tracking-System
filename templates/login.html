{% extends 'base.html' %}
{% block title %}Admin Login — EIA System{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Empower International Academy" class="auth-brand-logo"/>
      </div>
      <h2>Admin Access</h2>
      <p>EIA Management System</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" class="form-control"
               placeholder="Enter your username" required autofocus/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-key"></i> Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
  </div>
</div>

{% endblock %}
